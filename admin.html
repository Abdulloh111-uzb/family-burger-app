<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Family Burger — Admin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--green:#2A4D12;--green2:#1e3a0d;--gold:#F5A623;--orange:#FF6B00;--red:#e03030;--bg:#111410;--bg2:#181c13;--card:#1e2419;--card2:#242b1c;--border:rgba(255,255,255,0.07);--text:#f0f0e8;--muted:#7a8070;--r:14px}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.header{background:var(--green2);padding:16px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header h1{font-size:16px;font-weight:700;color:#fff;flex:1}
.header p{font-size:11px;color:rgba(255,255,255,.5)}
.logo{width:38px;height:38px;border-radius:50%;border:2px solid var(--gold);background:var(--green);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.content{padding:16px 16px 100px}
.sec-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px}

/* ADD BUTTON */
.add-btn{width:100%;background:var(--gold);border:none;border-radius:var(--r);color:#111;font-size:15px;font-weight:700;padding:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px}
.add-btn:active{opacity:.85}

/* PRODUCT LIST */
.prod-list{display:flex;flex-direction:column;gap:10px}
.prod-item{background:var(--card);border-radius:var(--r);padding:12px;display:flex;gap:12px;align-items:center;border:1px solid var(--border)}
.prod-thumb{width:56px;height:56px;border-radius:10px;background:var(--green2);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.prod-thumb img{width:100%;height:100%;object-fit:cover}
.prod-info{flex:1;min-width:0}
.prod-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-sub{font-size:12px;color:var(--muted);margin-top:3px}
.prod-price{font-size:13px;font-weight:700;color:var(--gold);margin-top:2px}
.prod-actions{display:flex;gap:6px;flex-shrink:0}
.act-btn{background:var(--card2);border:none;border-radius:9px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px}
.act-btn.del{background:rgba(224,48,48,.15)}
.act-btn:active{opacity:.7}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 18px 40px;width:100%;max-height:90vh;overflow-y:auto;animation:slideup .25s ease}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between}
.modal-close{background:var(--card);border:none;border-radius:50%;width:32px;height:32px;color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.fg{margin-bottom:14px}
.fl{font-size:11px;color:var(--muted);margin-bottom:7px;display:block;letter-spacing:.4px;text-transform:uppercase}
.fi{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:11px;color:var(--text);font-size:15px;padding:12px 14px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.fi:focus{border-color:var(--gold)}
select.fi option{background:var(--card);color:var(--text)}
.img-preview{width:100%;aspect-ratio:16/9;background:var(--card);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:48px;margin-bottom:14px;overflow:hidden;border:1.5px solid var(--border)}
.img-preview img{width:100%;height:100%;object-fit:cover}
.save-btn{width:100%;background:var(--gold);border:none;border-radius:var(--r);color:#111;font-size:15px;font-weight:700;padding:14px;cursor:pointer;margin-top:6px}
.save-btn:active{opacity:.85}
.del-btn{width:100%;background:rgba(224,48,48,.15);border:1px solid rgba(224,48,48,.3);border-radius:var(--r);color:var(--red);font-size:15px;font-weight:600;padding:13px;cursor:pointer;margin-top:10px}

/* EMPTY */
.empty{text-align:center;padding:50px 20px}
.empty-ico{font-size:50px;margin-bottom:12px}
.empty-txt{font-size:14px;color:var(--muted)}

/* LOADING */
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:20px;z-index:999;display:none;white-space:nowrap}
.toast.on{display:block;animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">👨‍💼</div>
  <div>
    <h1>Admin Panel</h1>
    <p>Family Burger</p>
  </div>
</div>

<div class="content">
  <button class="add-btn" onclick="openAdd()">＋ Yangi mahsulot qo'shish</button>
  <div class="sec-title">Mahsulotlar</div>
  <div class="prod-list" id="prodList"><div class="loading">⏳ Yuklanmoqda...</div></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-bg" id="modalBg" onclick="handleBgClick(event)">
  <div class="modal" id="modal">
    <div class="modal-title">
      <span id="modalTitle">Mahsulot qo'shish</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div class="img-preview" id="imgPreview"><span id="imgEmoji">🍔</span></div>

    <div class="fg">
      <label class="fl">Rasm URL (ixtiyoriy)</label>
      <input class="fi" id="fImg" type="url" placeholder="https://..." oninput="previewImg(this.value)">
    </div>
    <div class="fg">
      <label class="fl">Mahsulot nomi</label>
      <input class="fi" id="fName" type="text" placeholder="Masalan: Classic Burger">
    </div>
    <div class="fg">
      <label class="fl">Narxi (so'mda)</label>
      <input class="fi" id="fPrice" type="number" placeholder="25000">
    </div>
    <div class="fg">
      <label class="fl">Kategoriya</label>
      <select class="fi" id="fCat" onchange="updateEmoji()">
        <option value="Burgerlar">🍔 Burgerlar</option>
        <option value="Ichimliklar">🥤 Ichimliklar</option>
        <option value="Shirinliklar">🍰 Shirinliklar</option>
      </select>
    </div>
    <div class="fg">
      <label class="fl">Tavsif</label>
      <input class="fi" id="fDesc" type="text" placeholder="Qisqa tavsif...">
    </div>

    <button class="save-btn" onclick="saveProduct()">✅ Saqlash</button>
    <button class="del-btn" id="delBtn" style="display:none" onclick="deleteProduct()">🗑 Mahsulotni o'chirish</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const JSONBIN_ID  = "69d77d55aaba882197dd1746";
const JSONBIN_KEY = "$2a$10$nRkSTdJDfYyxIy84qlZOEufkHuxqWdmACat3IUXajUiHIFf8Uo1Eu";
const JSONBIN_URL = "https://api.jsonbin.io/v3/b/" + JSONBIN_ID;
const EMOJIS = {"Burgerlar":"🍔","Ichimliklar":"🥤","Shirinliklar":"🍰"};

let products = [];
let editId = null;

async function loadProducts(){
  try{
    const r = await fetch(JSONBIN_URL + "/latest", {headers:{"X-Master-Key":JSONBIN_KEY,"X-Bin-Meta":"false"}});
    const data = await r.json();
    products = data.products || [];
    renderList();
  }catch(e){
    document.getElementById('prodList').innerHTML = '<div class="loading">❌ Yuklab bolmadi</div>';
  }
}

async function saveToCloud(){
  await fetch(JSONBIN_URL, {
    method:"PUT",
    headers:{"X-Master-Key":JSONBIN_KEY,"Content-Type":"application/json"},
    body: JSON.stringify({products})
  });
}

function renderList(){
  const el = document.getElementById('prodList');
  if(!products.length){
    el.innerHTML = '<div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">Hali mahsulot yoq</div></div>';
    return;
  }
  el.innerHTML = products.map(p => `
    <div class="prod-item">
      <div class="prod-thumb">
        ${p.img ? `<img src="${p.img}" onerror="this.style.display='none'">` : ''}
        <span style="${p.img?'display:none':''}">${p.em||'🍽'}</span>
      </div>
      <div class="prod-info">
        <div class="prod-name">${p.name}</div>
        <div class="prod-sub">${p.cat}</div>
        <div class="prod-price">${p.price.toLocaleString()} som</div>
      </div>
      <div class="prod-actions">
        <button class="act-btn" onclick="openEdit(${p.id})">✏️</button>
        <button class="act-btn del" onclick="confirmDelete(${p.id})">🗑</button>
      </div>
    </div>`).join('');
}

function openAdd(){
  editId = null;
  document.getElementById('modalTitle').textContent = "Mahsulot qo'shish";
  document.getElementById('fImg').value = '';
  document.getElementById('fName').value = '';
  document.getElementById('fPrice').value = '';
  document.getElementById('fCat').value = 'Burgerlar';
  document.getElementById('fDesc').value = '';
  document.getElementById('delBtn').style.display = 'none';
  document.getElementById('imgEmoji').textContent = '🍔';
  document.getElementById('imgPreview').innerHTML = '<span id="imgEmoji">🍔</span>';
  document.getElementById('modalBg').classList.add('on');
}

function openEdit(id){
  const p = products.find(x => x.id === id);
  if(!p) return;
  editId = id;
  document.getElementById('modalTitle').textContent = "Mahsulotni tahrirlash";
  document.getElementById('fImg').value = p.img || '';
  document.getElementById('fName').value = p.name;
  document.getElementById('fPrice').value = p.price;
  document.getElementById('fCat').value = p.cat;
  document.getElementById('fDesc').value = p.desc || '';
  document.getElementById('delBtn').style.display = 'block';
  const prev = document.getElementById('imgPreview');
  if(p.img){
    prev.innerHTML = `<img src="${p.img}" onerror="this.innerHTML='${p.em||'🍽'}'">`;
  } else {
    prev.innerHTML = `<span id="imgEmoji">${p.em||EMOJIS[p.cat]||'🍽'}</span>`;
  }
  document.getElementById('modalBg').classList.add('on');
}

function closeModal(){
  document.getElementById('modalBg').classList.remove('on');
}

function handleBgClick(e){
  if(e.target === document.getElementById('modalBg')) closeModal();
}

function previewImg(url){
  const prev = document.getElementById('imgPreview');
  const cat = document.getElementById('fCat').value;
  if(url){
    prev.innerHTML = `<img src="${url}" onerror="this.parentElement.innerHTML='<span>${EMOJIS[cat]||'🍽'}</span>'">`;
  } else {
    prev.innerHTML = `<span>${EMOJIS[cat]||'🍔'}</span>`;
  }
}

function updateEmoji(){
  const cat = document.getElementById('fCat').value;
  const url = document.getElementById('fImg').value;
  if(!url){
    document.getElementById('imgPreview').innerHTML = `<span>${EMOJIS[cat]||'🍔'}</span>`;
  }
}

async function saveProduct(){
  const name = document.getElementById('fName').value.trim();
  const price = parseFloat(document.getElementById('fPrice').value);
  const cat = document.getElementById('fCat').value;
  const desc = document.getElementById('fDesc').value.trim();
  const img = document.getElementById('fImg').value.trim() || null;

  if(!name){ alert("Nomni kiriting!"); return; }
  if(!price || isNaN(price)){ alert("Narxni kiriting!"); return; }

  if(editId){
    const idx = products.findIndex(x => x.id === editId);
    if(idx !== -1){
      products[idx] = {...products[idx], name, price, cat, desc, img, em: EMOJIS[cat]||'🍽'};
    }
  } else {
    const newId = Math.max(...products.map(p => p.id), 0) + 1;
    products.push({id:newId, name, price, cat, desc, img, em: EMOJIS[cat]||'🍽'});
  }

  await saveToCloud();
  renderList();
  closeModal();
  showToast(editId ? "✅ Yangilandi!" : "✅ Qo'shildi!");
  tg.HapticFeedback && tg.HapticFeedback.impactOccurred('medium');
}

async function confirmDelete(id){
  const p = products.find(x => x.id === id);
  if(!p) return;
  if(confirm(`"${p.name}" ni o'chirishni tasdiqlaysizmi?`)){
    products = products.filter(x => x.id !== id);
    await saveToCloud();
    renderList();
    showToast("🗑 O'chirildi!");
  }
}

async function deleteProduct(){
  if(editId){
    await confirmDelete(editId);
    closeModal();
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  setTimeout(() => t.classList.remove('on'), 2500);
}

loadProducts();
</script>
</body>
</html>
