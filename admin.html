<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Family Burger Admin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --green:#2A4D12;--green2:#1a3009;--gold:#F5A623;--orange:#FF6B00;
  --red:#e03030;--bg:#0f1410;--card:#1a2015;--card2:#222b1a;
  --border:rgba(255,255,255,0.08);--text:#f0f0e8;--muted:#6a7060;--r:13px
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

/* HEADER */
.hdr{background:var(--green2);padding:14px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.hdr-ico{width:36px;height:36px;border-radius:50%;border:2px solid var(--gold);background:var(--green);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.hdr h1{font-size:15px;font-weight:700;color:#fff}
.hdr p{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}

/* CONTENT */
.wrap{padding:14px 14px 100px}

/* ADD BTN */
.add-fab{width:100%;background:var(--gold);border:none;border-radius:var(--r);color:#111;font-size:15px;font-weight:700;padding:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:18px;letter-spacing:.2px}
.add-fab:active{opacity:.85}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px}
.stat{background:var(--card);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--border)}
.stat-n{font-size:20px;font-weight:700;color:var(--gold)}
.stat-l{font-size:10px;color:var(--muted);margin-top:2px}

/* CAT FILTER */
.cats{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.cats::-webkit-scrollbar{display:none}
.cat-pill{background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:12px;font-weight:500;padding:6px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.cat-pill.on{background:var(--green);border-color:var(--gold);color:var(--gold)}

/* PROD LIST */
.prod-list{display:flex;flex-direction:column;gap:8px}
.prod-item{background:var(--card);border-radius:var(--r);padding:11px;display:flex;gap:11px;align-items:center;border:1px solid var(--border);cursor:pointer;transition:background .15s}
.prod-item:active{background:var(--card2)}
.pthumb{width:58px;height:58px;border-radius:10px;background:var(--green2);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden;position:relative}
.pthumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.pthumb span{position:relative;z-index:1}
.pinfo{flex:1;min-width:0}
.pname{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.psub{font-size:11px;color:var(--muted);margin-top:2px}
.pprice{font-size:13px;font-weight:700;color:var(--gold);margin-top:3px}
.pact{display:flex;gap:6px;flex-shrink:0}
.pact-btn{background:var(--card2);border:none;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.pact-btn.red{background:rgba(224,48,48,.12)}
.pact-btn:active{opacity:.6}

/* EMPTY / LOADING */
.empty{text-align:center;padding:50px 20px}
.empty-ico{font-size:48px;margin-bottom:12px}
.empty-txt{font-size:14px;color:var(--muted)}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}

/* DRAWER */
.drawer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200}
.drawer-bg.on{display:block}
.drawer{position:fixed;bottom:0;left:0;right:0;background:#161d12;border-radius:20px 20px 0 0;padding:0 0 40px;z-index:201;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,1.2,.5,1)}
.drawer.on{transform:translateY(0)}
.drawer-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 16px}
.drawer-head{padding:0 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.drawer-title{font-size:16px;font-weight:700}
.drawer-close{background:var(--card);border:none;border-radius:50%;width:30px;height:30px;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.drawer-body{padding:16px}

/* FORM */
.img-box{width:100%;aspect-ratio:16/9;background:var(--card);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:60px;margin-bottom:14px;overflow:hidden;border:1.5px solid var(--border);position:relative}
.img-box img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.img-box span{position:relative;z-index:1}
.fg{margin-bottom:13px}
.fl{font-size:11px;color:var(--muted);margin-bottom:6px;display:block;letter-spacing:.4px;text-transform:uppercase}
.fi{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:11px;color:var(--text);font-size:15px;padding:12px 13px;outline:none;-webkit-appearance:none;transition:border-color .2s}
.fi:focus{border-color:var(--gold)}
select.fi{background-image:none}
.fi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.save-btn{width:100%;background:var(--gold);border:none;border-radius:var(--r);color:#111;font-size:15px;font-weight:700;padding:13px;cursor:pointer;margin-top:4px}
.save-btn:active{opacity:.85}
.del-btn{width:100%;background:rgba(224,48,48,.1);border:1.5px solid rgba(224,48,48,.25);border-radius:var(--r);color:#e05050;font-size:14px;font-weight:600;padding:12px;cursor:pointer;margin-top:10px}
.del-btn:active{opacity:.7}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(0);background:#2A4D12;border:1px solid var(--gold);color:var(--gold);font-size:13px;font-weight:600;padding:9px 20px;border-radius:20px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-ico">👨‍💼</div>
  <div>
    <h1>Admin Panel</h1>
    <p>Family Burger — mahsulotlarni boshqarish</p>
  </div>
</div>

<div class="wrap">
  <button class="add-fab" onclick="openAdd()">＋ Yangi mahsulot qo'shish</button>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="sBurger">—</div><div class="stat-l">🍔 Burger</div></div>
    <div class="stat"><div class="stat-n" id="sDrink">—</div><div class="stat-l">🥤 Ichimlik</div></div>
    <div class="stat"><div class="stat-n" id="sSweet">—</div><div class="stat-l">🍰 Shirinlik</div></div>
  </div>

  <div class="cats">
    <div class="cat-pill on" onclick="filterCat('all',this)">Hammasi</div>
    <div class="cat-pill" onclick="filterCat('Burgerlar',this)">🍔 Burgerlar</div>
    <div class="cat-pill" onclick="filterCat('Ichimliklar',this)">🥤 Ichimliklar</div>
    <div class="cat-pill" onclick="filterCat('Shirinliklar',this)">🍰 Shirinliklar</div>
  </div>

  <div class="prod-list" id="prodList"><div class="loading">⏳ Yuklanmoqda...</div></div>
</div>

<!-- DRAWER -->
<div class="drawer-bg" id="drawerBg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-head">
    <span class="drawer-title" id="drawerTitle">Mahsulot qo'shish</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body">

    <div class="img-box" id="imgBox"><span id="imgEm">🍔</span></div>

    <div class="fg">
      <label class="fl">Rasm URL</label>
      <input class="fi" id="fImg" type="url" placeholder="https://example.com/burger.jpg" oninput="previewImg(this.value)">
    </div>

    <div class="fg">
      <label class="fl">Mahsulot nomi</label>
      <input class="fi" id="fName" type="text" placeholder="Masalan: Classic Burger">
    </div>

    <div class="fi-row">
      <div class="fg">
        <label class="fl">Narxi (so'm)</label>
        <input class="fi" id="fPrice" type="number" placeholder="25000" inputmode="numeric">
      </div>
      <div class="fg">
        <label class="fl">Kategoriya</label>
        <select class="fi" id="fCat" onchange="catChanged()">
          <option value="Burgerlar">🍔 Burgerlar</option>
          <option value="Ichimliklar">🥤 Ichimliklar</option>
          <option value="Shirinliklar">🍰 Shirinliklar</option>
        </select>
      </div>
    </div>

    <div class="fg">
      <label class="fl">Tavsif</label>
      <input class="fi" id="fDesc" type="text" placeholder="Qisqa tavsif...">
    </div>

    <button class="save-btn" id="saveBtn" onclick="saveProduct()">✅ Saqlash</button>
    <button class="del-btn" id="delBtn" style="display:none" onclick="deleteProduct()">🗑 Mahsulotni o'chirish</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const JB_ID  = "69d77d55aaba882197dd1746";
const JB_KEY = "$2a$10$nRkSTdJDfYyxIy84qlZOEufkHuxqWdmACat3IUXajUiHIFf8Uo1Eu";
const JB_URL = "https://api.jsonbin.io/v3/b/" + JB_ID;
const EM = {Burgerlar:"🍔", Ichimliklar:"🥤", Shirinliklar:"🍰"};

let products = [];
let editId = null;
let curFilter = "all";

async function load(){
  try{
    const r = await fetch(JB_URL+"/latest",{headers:{"X-Master-Key":JB_KEY,"X-Bin-Meta":"false"}});
    const d = await r.json();
    products = d.products||[];
    render(); updateStats();
  }catch(e){
    document.getElementById('prodList').innerHTML='<div class="loading">❌ Internet xatosi. Qayta urinib koʻring.</div>';
  }
}

async function pushCloud(){
  await fetch(JB_URL,{method:"PUT",headers:{"X-Master-Key":JB_KEY,"Content-Type":"application/json"},body:JSON.stringify({products})});
}

function updateStats(){
  document.getElementById('sBurger').textContent = products.filter(p=>p.cat==="Burgerlar").length;
  document.getElementById('sDrink').textContent  = products.filter(p=>p.cat==="Ichimliklar").length;
  document.getElementById('sSweet').textContent  = products.filter(p=>p.cat==="Shirinliklar").length;
}

function filterCat(cat, el){
  curFilter = cat;
  document.querySelectorAll('.cat-pill').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  render();
}

function render(){
  const list = curFilter==="all" ? products : products.filter(p=>p.cat===curFilter);
  const el = document.getElementById('prodList');
  if(!list.length){
    el.innerHTML='<div class="empty"><div class="empty-ico">📭</div><div class="empty-txt">Mahsulot yoq</div></div>';
    return;
  }
  el.innerHTML = list.map(p=>`
    <div class="prod-item" onclick="openEdit(${p.id})">
      <div class="pthumb">
        ${p.img?`<img src="${p.img}" onerror="this.style.display='none'">`:''}
        <span>${p.em||EM[p.cat]||'🍽'}</span>
      </div>
      <div class="pinfo">
        <div class="pname">${p.name}</div>
        <div class="psub">${p.cat}${p.desc?' · '+p.desc.slice(0,30):''}${p.desc&&p.desc.length>30?'...':''}</div>
        <div class="pprice">${p.price.toLocaleString()} soʻm</div>
      </div>
      <div class="pact">
        <button class="pact-btn" onclick="event.stopPropagation();openEdit(${p.id})">✏️</button>
        <button class="pact-btn red" onclick="event.stopPropagation();confirmDel(${p.id})">🗑</button>
      </div>
    </div>`).join('');
}

function openAdd(){
  editId=null;
  document.getElementById('drawerTitle').textContent="Mahsulot qoʻshish";
  document.getElementById('fImg').value='';
  document.getElementById('fName').value='';
  document.getElementById('fPrice').value='';
  document.getElementById('fCat').value='Burgerlar';
  document.getElementById('fDesc').value='';
  document.getElementById('delBtn').style.display='none';
  document.getElementById('imgBox').innerHTML='<span id="imgEm">🍔</span>';
  showDrawer();
}

function openEdit(id){
  const p=products.find(x=>x.id===id);
  if(!p) return;
  editId=id;
  document.getElementById('drawerTitle').textContent="Mahsulotni tahrirlash";
  document.getElementById('fImg').value=p.img||'';
  document.getElementById('fName').value=p.name;
  document.getElementById('fPrice').value=p.price;
  document.getElementById('fCat').value=p.cat;
  document.getElementById('fDesc').value=p.desc||'';
  document.getElementById('delBtn').style.display='block';
  const box=document.getElementById('imgBox');
  box.innerHTML=p.img?`<img src="${p.img}" onerror="this.style.display='none'"><span>${p.em||EM[p.cat]}</span>`:`<span>${p.em||EM[p.cat]}</span>`;
  showDrawer();
}

function showDrawer(){
  document.getElementById('drawerBg').classList.add('on');
  setTimeout(()=>document.getElementById('drawer').classList.add('on'),10);
}

function closeDrawer(){
  document.getElementById('drawer').classList.remove('on');
  setTimeout(()=>document.getElementById('drawerBg').classList.remove('on'),280);
}

function previewImg(url){
  const cat=document.getElementById('fCat').value;
  const box=document.getElementById('imgBox');
  if(url){
    box.innerHTML=`<img src="${url}" onerror="this.style.display='none'"><span>${EM[cat]}</span>`;
  } else {
    box.innerHTML=`<span>${EM[cat]}</span>`;
  }
}

function catChanged(){
  const url=document.getElementById('fImg').value;
  if(!url) previewImg('');
}

async function saveProduct(){
  const name=document.getElementById('fName').value.trim();
  const price=parseFloat(document.getElementById('fPrice').value);
  const cat=document.getElementById('fCat').value;
  const desc=document.getElementById('fDesc').value.trim();
  const img=document.getElementById('fImg').value.trim()||null;
  if(!name){alert("Nomni kiriting!");return;}
  if(!price||isNaN(price)){alert("Narxni kiriting!");return;}
  const btn=document.getElementById('saveBtn');
  btn.textContent="⏳ Saqlanmoqda...";btn.disabled=true;
  if(editId){
    const i=products.findIndex(x=>x.id===editId);
    if(i!==-1) products[i]={...products[i],name,price,cat,desc,img,em:EM[cat]};
  } else {
    const nid=Math.max(...products.map(p=>p.id),0)+1;
    products.push({id:nid,name,price,cat,desc,img,em:EM[cat]});
  }
  await pushCloud();
  render(); updateStats(); closeDrawer();
  toast(editId?"✅ Yangilandi!":"✅ Qoʻshildi!");
  btn.textContent="✅ Saqlash";btn.disabled=false;
  tg.HapticFeedback&&tg.HapticFeedback.impactOccurred('medium');
}

async function confirmDel(id){
  const p=products.find(x=>x.id===id);
  if(!p||!confirm(`"${p.name}" ni oʻchirasizmi?`)) return;
  products=products.filter(x=>x.id!==id);
  await pushCloud();
  render(); updateStats(); toast("🗑 Oʻchirildi!");
  tg.HapticFeedback&&tg.HapticFeedback.impactOccurred('medium');
}

async function deleteProduct(){
  if(editId){ await confirmDel(editId); closeDrawer(); }
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2500);
}

load();
</script>
</body>
</html>
